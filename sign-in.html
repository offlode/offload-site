<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Offload</title>
  <meta name="description" content="Sign in to your Offload account. Track orders, manage preferences, and more.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 36 36' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='18' cy='18' r='16' stroke='%235B4BC4' stroke-width='2.5' fill='none'/%3E%3Cpath d='M12 18c0-3.3 2.7-6 6-6s6 2.7 6 6-2.7 6-6 6' stroke='%235B4BC4' stroke-width='2.5' stroke-linecap='round' fill='none'/%3E%3Ccircle cx='18' cy='18' r='2' fill='%235B4BC4'/%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #5B4BC4;
      --primary-hover: #4a3bb3;
      --bg: #010101;
      --surface: #1A1A1A;
      --surface-border: #2E2E2E;
      --text: #ffffff;
      --text-secondary: #a0a0a0;
      --text-muted: #6b6b6b;
      --error: #ef4444;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .signin-card {
      max-width: 420px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 16px;
      padding: 40px 32px;
    }
    .logo-link {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
      margin-bottom: 32px;
      justify-content: center;
    }
    .logo-link span {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 6px;
      text-align: center;
    }
    .subtitle {
      font-size: 0.88rem;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 28px;
    }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid var(--surface-border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: var(--font);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(91,75,196,0.15);
    }
    .field input.error {
      border-color: var(--error);
    }
    .field .error-msg {
      font-size: 0.78rem;
      color: var(--error);
      margin-top: 4px;
      display: none;
      font-weight: 500;
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      gap: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--surface-border);
    }
    .divider span {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .signup-link {
      text-align: center;
      font-size: 0.88rem;
      color: var(--text-secondary);
    }
    .signup-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .signup-link a:hover { text-decoration: underline; }
    .msg {
      text-align: center;
      font-size: 0.85rem;
      margin-top: 12px;
      min-height: 1.2em;
    }
    .msg.success { color: #22c55e; }
    .msg.error { color: var(--error); }
    .back-home {
      margin-top: 24px;
      text-align: center;
    }
    .back-home a {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-home a:hover { color: var(--text); }
    @media (max-width: 480px) {
      .signin-card { padding: 28px 20px; }
      h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="signin-card">
    <a href="/" class="logo-link">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
        <circle cx="18" cy="18" r="16" stroke="#5B4BC4" stroke-width="2.5"/>
        <path d="M12 18c0-3.3 2.7-6 6-6s6 2.7 6 6-2.7 6-6 6" stroke="#5B4BC4" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="18" cy="18" r="2" fill="#5B4BC4"/>
      </svg>
      <span>offload</span>
    </a>

    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to your Offload account</p>

    <form id="signin-form" onsubmit="return false;">
      <div class="field">
        <label for="signin-email">Email</label>
        <input type="email" id="signin-email" placeholder="your@email.com" autocomplete="email">
        <div class="error-msg" id="email-error"></div>
      </div>
      <div class="field">
        <label for="signin-password">Password</label>
        <input type="password" id="signin-password" placeholder="Enter your password" autocomplete="current-password">
        <div class="error-msg" id="password-error"></div>
      </div>
      <button type="button" class="btn-primary" id="signin-btn" onclick="handleSignIn()">Sign In</button>
      <div class="msg" id="signin-msg"></div>
    </form>

    <div class="divider"><span>or</span></div>

    <p class="signup-link">
      Don't have an account? <a href="/#signup-section">Sign Up</a>
    </p>
  </div>

  <div class="back-home">
    <a href="/">&larr; Back to Offload</a>
  </div>

<script>
const API_BASE = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
  ? 'http://localhost:5000'
  : 'https://api.offloadusa.com';

async function handleSignIn() {
  const email = document.getElementById('signin-email');
  const password = document.getElementById('signin-password');
  const msg = document.getElementById('signin-msg');
  const btn = document.getElementById('signin-btn');

  // Clear errors
  email.classList.remove('error');
  password.classList.remove('error');
  document.getElementById('email-error').style.display = 'none';
  document.getElementById('password-error').style.display = 'none';
  msg.textContent = '';
  msg.className = 'msg';

  // Validate
  if (!email.value.trim()) {
    email.classList.add('error');
    const err = document.getElementById('email-error');
    err.textContent = 'Please enter your email address';
    err.style.display = 'block';
    email.focus();
    return;
  }
  if (!password.value) {
    password.classList.add('error');
    const err = document.getElementById('password-error');
    err.textContent = 'Please enter your password';
    err.style.display = 'block';
    password.focus();
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    const res = await fetch(API_BASE + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: email.value.trim(),
        password: password.value,
      }),
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Invalid email or password');
    }

    msg.textContent = 'Signed in successfully. Redirecting...';
    msg.className = 'msg success';

    // Redirect based on role
    const role = data.user?.role || 'customer';
    if (role === 'admin' || role === 'manager') {
      window.location.href = 'https://admin.offloadusa.com';
    } else {
      window.location.href = '/';
    }
  } catch (err) {
    msg.textContent = err.message || 'Sign in failed. Please try again.';
    msg.className = 'msg error';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

// Enter key to submit
document.getElementById('signin-password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleSignIn();
});
document.getElementById('signin-email').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('signin-password').focus();
});
</script>
</body>
</html>
